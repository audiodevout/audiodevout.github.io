<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#008080">
  <title>Road Paint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="splash">
    <div class="splash-sky">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="splash-sun"></div>
    </div>

    <div class="splash-content">
      <h1 class="splash-title">ROAD<br>PAINT</h1>

      <div class="splash-car">
        <div class="car-roof"></div>
        <div class="car-window"></div>
        <div class="car-body"></div>
        <div class="car-light"></div>
        <div class="car-wheel car-wheel-l"></div>
        <div class="car-wheel car-wheel-r"></div>
      </div>
    </div>

    <div class="splash-road">
      <div class="splash-road-line"></div>
    </div>
  </div>

  <div id="hint">Drag to draw roads</div>
  <div id="error" hidden></div>
  <script type="module" src="app.js"></script>
</body>
</html>
